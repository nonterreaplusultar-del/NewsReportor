name: Bilingual RSS Digest

on:
  schedule:
    # Beijing time: 08:30, 12:30, 18:30, 22:30  →  UTC: 00:30, 04:30, 10:30, 14:30
    - cron: "30 0,4,10,14 * * *"
  workflow_dispatch:

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL || 'https://api.deepseek.com' }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL || 'deepseek-v4-pro' }}
          DEEPSEEK_REASONING_EFFORT: ${{ secrets.DEEPSEEK_REASONING_EFFORT || 'high' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_ITEMS_PER_DIGEST: ${{ secrets.MAX_ITEMS_PER_DIGEST || '80' }}
        run: python scripts/run_digest_once.py

      - name: Commit and push state changes
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json data/items.jsonl digests/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update digest state [skip ci]"
            git push
          fi
